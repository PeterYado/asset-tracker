<style>

  html,body{margin:0;padding:0;}

  header h1{font-size:17px; font-weight:600; margin:0; letter-spacing:.02em;}
  header .upd{font-size:12px; color:var(--ink3);}
  main{padding:6px 14px 20px;}
  .card{background:var(--card); border:1px solid var(--line); border-radius:14px; padding:16px 18px; margin-bottom:12px;}
  .lbl{font-size:12px; color:var(--ink2); letter-spacing:.03em; margin:0 0 4px;}
  .big{font-size:30px; font-weight:600; letter-spacing:-.01em; margin:0;}
  .pos{color:var(--ever);} .neg{color:var(--loss);}
  .row{display:flex; justify-content:space-between; align-items:baseline; padding:7px 0; border-top:1px solid var(--line);}
  .row:first-child{border-top:0;}
  .row .k{font-size:13px; color:var(--ink2);}
  .row .v{font-size:14px;}
  .grid2{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
  .mini{background:var(--card); border:1px solid var(--line); border-radius:12px; padding:12px 14px;}
  .mini .lbl{margin-bottom:3px;}
  .mini .mv{font-size:18px; font-weight:600;}
  .mini .ms{font-size:11px; color:var(--ink3); margin-top:1px;}
  .seg{margin-bottom:11px;}
  .seg .sh{display:flex; justify-content:space-between; font-size:12px; margin-bottom:4px;}
  .seg .bar{height:7px; border-radius:4px; background:#EDE9DE; overflow:hidden;}
  .seg .fill{height:100%; border-radius:4px;}

  label.fl{font-size:12px; color:var(--ink2); display:block; margin:0 0 4px;}
  .field{margin-bottom:12px;}
  button.btn{height:44px; width:100%; border:1px solid var(--ever); background:var(--ever); color:#fff; border-radius:10px; font-weight:500; cursor:pointer; transition:.12s;}

  button.ghost{height:40px; width:100%; border:1px solid var(--line2); background:#fff; color:var(--ink); border-radius:10px; cursor:pointer;}
  button.ghost:active{transform:scale(.985);}
  button.tiny{height:30px; padding:0 12px; border:1px solid var(--line2); background:#fff; color:var(--ink2); border-radius:8px; cursor:pointer; font-size:12px; white-space:nowrap;}
  .ic{background:var(--card); border:1px solid var(--line); border-radius:12px; padding:13px 15px; margin-bottom:9px;}

  .calc{display:flex; justify-content:space-between; align-items:baseline; border-top:1px solid var(--line); margin-top:11px; padding-top:9px;}

  nav button.on{color:var(--ever);}
  .fab{position:fixed; bottom:calc(74px + env(safe-area-inset-bottom)); right:max(16px, calc(50% - 260px + 16px)); width:54px; height:54px; border-radius:50%; background:var(--ever); color:#fff; border:0; font-size:26px; line-height:1; cursor:pointer; box-shadow:0 4px 14px rgba(20,101,79,.34); z-index:5;}
  .note{font-size:11.5px; color:var(--ink3); line-height:1.6; margin:8px 2px 0;}
  .hidden{display:none;}
  .modal-bg{position:fixed; inset:0; background:rgba(30,28,24,.42); z-index:20; display:flex; align-items:flex-end; justify-content:center;}
  .sheet{background:var(--paper); width:100%; max-width:520px; max-height:92vh; overflow:auto; border-radius:18px 18px 0 0; padding:18px 16px calc(16px + env(safe-area-inset-bottom));}

  .rmx{background:none; border:0; color:var(--ink3); font-size:18px; cursor:pointer; line-height:1; padding:0 2px;}
  .bl-row{display:grid; grid-template-columns:minmax(0,1fr) minmax(0,1.3fr) minmax(0,1.4fr) auto; gap:7px; align-items:center; margin-bottom:8px;}

  .datewrap{position:relative; width:100%; height:36px;}
  .datewrap input[type="date"]{position:absolute; inset:0; width:100%; height:100%; min-width:0; padding:0 8px; font-size:13px; box-sizing:border-box;}
  /* --- auth / sync (Step2) --- */
  .syncb{display:inline-flex; align-items:center; gap:5px; font-size:11px; color:var(--ink3); margin-left:8px;}
  .syncb .dot{width:7px; height:7px; border-radius:50%; background:var(--ink3); display:inline-block;}
  .syncb.s-ok .dot{background:var(--ever);} .syncb.s-save .dot{background:var(--gold);} .syncb.s-err .dot{background:var(--loss);}
  .syncb.s-ok{color:var(--ever);} .syncb.s-save{color:var(--gold);} .syncb.s-err{color:var(--loss);}
  #auth{position:fixed; inset:0; background:var(--paper); z-index:60; display:flex; align-items:center; justify-content:center; padding:24px;}
  #auth .box{width:100%; max-width:340px;}
  #auth h1{font-size:20px; font-weight:600; margin:0 0 4px; letter-spacing:.02em;}
  #auth p.sub{font-size:13px; color:var(--ink2); margin:0 0 22px;}
  #auth .field{margin-bottom:12px;}
  #auth .err{font-size:12px; color:var(--loss); min-height:16px; margin:2px 2px 8px;}
  #auth .swap{font-size:13px; color:var(--ever); background:none; border:0; cursor:pointer; padding:8px; width:100%; margin-top:4px;}
</style>
</head>
<body>

var state = S();

/* ===== Step2: Supabase 同期 ===== */
var SB_URL="https://knqfipommlddbqranpgm.supabase.co";
var SB_KEY="sb_publishable_jo_GSfe4Nn5f1qVdXapaFQ_TMa2XQ0v";
var sb=null, SESSION=null, AUTHMODE='signin', saveTimer=null;
try{ if(window.supabase) sb=window.supabase.createClient(SB_URL, SB_KEY); }catch(e){}

function setSync(s){
  var b=document.getElementById('syncb'), t=document.getElementById('synct'); if(!b)return;
  b.className='syncb '+(s==='ok'?'s-ok':s==='save'?'s-save':s==='err'?'s-err':'');
  t.textContent = s==='ok'?'同期済み':s==='save'?'保存中…':s==='err'?'エラー':'';
}
function persist(){
  if(!sb||!SESSION) return;
  setSync('save');
  if(saveTimer) clearTimeout(saveTimer);
  saveTimer=setTimeout(function(){
    sb.from('app_state').upsert({user_id:SESSION.user.id, data:state, updated_at:new Date().toISOString()})
      .then(function(r){ setSync(r.error?'err':'ok'); if(r.error) console.error(r.error); });
  },600);
}
function loadState(){
  return sb.from('app_state').select('data').eq('user_id',SESSION.user.id).maybeSingle()
    .then(function(r){
      if(r.data && r.data.data && r.data.data.securities){ state=r.data.data; setSync('ok'); }
      else { /* 初回：いま手元にあるデータ（PETERの実データ）をそのままクラウドへ */ persist(); }
    });
}
function swapAuth(){
  AUTHMODE = AUTHMODE==='signin'?'signup':'signin';
  document.getElementById('authBtn').textContent = AUTHMODE==='signin'?'サインイン':'登録する';
  document.getElementById('authSwap').textContent = AUTHMODE==='signin'?'アカウントを作成する':'既にアカウントをお持ちの方';
  document.getElementById('authSub').textContent = AUTHMODE==='signin'?'サインインしてデータを同期します。':'新しいアカウントを作成します。';
  document.getElementById('authErr').textContent='';
  document.getElementById('authPw').setAttribute('autocomplete', AUTHMODE==='signin'?'current-password':'new-password');
}
function doAuth(){
  var email=document.getElementById('authEmail').value.trim();
  var pw=document.getElementById('authPw').value;
  var err=document.getElementById('authErr'); err.textContent='';
  if(!sb){ err.textContent='ライブラリを読み込めませんでした（本番URLでお試しください）。'; return; }
  if(!email||!pw){ err.textContent='メールとパスワードを入力してください。'; return; }
  var btn=document.getElementById('authBtn'); btn.disabled=true; btn.textContent='…';
  var p = AUTHMODE==='signin'
    ? sb.auth.signInWithPassword({email:email,password:pw})
    : sb.auth.signUp({email:email,password:pw});
  p.then(function(r){
    btn.disabled=false; btn.textContent=AUTHMODE==='signin'?'サインイン':'登録する';
    if(r.error){ err.textContent=r.error.message; return; }
    if(!r.data.session){ err.textContent='確認メールを送信しました。メール内のリンクを開いてから、サインインしてください。'; AUTHMODE='signin'; swapAuth(); swapAuth(); return; }
    enterApp(r.data.session);
  });
}
function enterApp(session){
  SESSION=session;
  document.getElementById('auth').style.display='none';
  loadState().then(function(){ go('dash'); });
}
function signOut(){
  if(sb&&SESSION) sb.auth.signOut();
  SESSION=null; setSync(''); document.getElementById('auth').style.display='flex';
}


/* ===== helpers ===== */
function yen(n){ return "¥"+Math.round(n).toLocaleString(); }
function signed(n){ return (n>=0?"+":"")+Math.round(n).toLocaleString(); }
function pct(n){ return (n>=0?"+":"")+n.toFixed(2)+"%"; }
function secById(id){ return state.securities.find(function(s){return s.id===id;}); }
function snapTotal(sn){ var t=0; for(var k in sn.h){ t+=Number(sn.h[k].p)||0; } return t; }
function snapsSorted(){ return state.snapshots.slice().sort(function(a,b){return a.date<b.date?-1:1;}); }
function priorSnap(date, excludeId){ var c=null; snapsSorted().forEach(function(s){ if(s.id===excludeId)return; if(s.date<date) c=s; }); return c; }
function dispDate(d){ return d.replace(/-/g,'/'); }

/* ===== dashboard ===== */
var CHARTMODE='month', chartInst=null;
function vDash(){
  var ss=snapsSorted();
  if(!ss.length){ return '<div class="card">まだ確認がありません。右下の＋から最初の記録を追加してください。</div>'; }
  var cur=ss[ss.length-1], prev=ss.length>1?ss[ss.length-2]:null;
  var curT=snapTotal(cur), prevT=prev?snapTotal(prev):null;
  document.getElementById('hdrupd').textContent=dispDate(cur.date);
  var tg=state.settings.target, html='';
  html+='<div class="card"><p class="lbl">総資産</p><p class="big num">'+yen(curT)+'</p>';
  if(prevT!=null){ var d=curT-prevT; html+='<p class="deltarow"><span class="'+(d>=0?'pos':'neg')+'">前回比 '+signed(d)+'</span>（'+dispDate(prev.date)+' → '+dispDate(cur.date)+'）</p>'; }
  html+='</div>';
  /* baseline + target minis */
  html+='<div class="grid2" style="margin-bottom:12px;">';
  state.baselines.slice().sort(function(a,b){return a.date<b.date?-1:1;}).forEach(function(b){
    var d=curT-b.total, p=b.total>0?d/b.total*100:0;
    html+='<div class="mini"><p class="lbl">'+(b.label||dispDate(b.date))+'比</p><p class="mv num '+(d>=0?'pos':'neg')+'">'+pct(p)+'</p><p class="ms num">'+signed(d)+'</p></div>';
  });
  var tp=curT/tg*100, reached=curT>=tg;
  html+='<div class="mini"><p class="lbl">'+yen(tg)+'目標</p><p class="mv num '+(reached?'pos':'')+'">'+(reached?'達成 ':'')+Math.round(tp)+'%</p><p class="ms">'+(reached?'安定維持フェーズ':'到達まで '+yen(tg-curT))+'</p></div>';
  html+='</div>';
  /* chart */
  html+='<div class="card"><div style="display:flex;justify-content:space-between;align-items:center;"><p class="lbl" style="margin:0;">総資産の推移</p>';
  html+='<span class="seg-toggle">'
      +'<button onclick="setMode(\'year\')" class="'+(CHARTMODE==='year'?'on':'')+'">年</button>'

function setMode(m){ CHARTMODE=m; var v=document.getElementById('view'); v.innerHTML=vDash(); setTimeout(drawChart,20); window.scrollTo(0,0); }

function chartSeries(mode){
  var pts=[];
  state.baselines.forEach(function(b){ pts.push({date:b.date,y:b.total,base:true}); });
  snapsSorted().forEach(function(sn){ pts.push({date:sn.date,y:snapTotal(sn),base:false}); });
  pts.sort(function(a,b){return a.date<b.date?-1:1;});
  if(mode==='day'){
    var d=snapsSorted().slice(-31);
    return { labels:d.map(function(s){var p=s.date.split('-');return p[1]+'/'+p[2];}), values:d.map(function(s){return snapTotal(s);}) };
  }
  function bucket(keyFn){ var m={}; pts.forEach(function(p){ m[keyFn(p.date)]=p.y; }); return m; } /* later date overwrites → keeps latest per bucket */
  if(mode==='year'){
    var mm=bucket(function(d){return d.slice(0,4);});
    var keys=Object.keys(mm).sort();
    return { labels:keys, values:keys.map(function(k){return mm[k];}) };
  }
  /* month: 直近12ヶ月以内のみ（それより前は年モードが担当） */
  var mm=bucket(function(d){return d.slice(0,7);});
  var anchor=pts[pts.length-1].date.slice(0,7);
  var ci=(+anchor.slice(0,4))*12+(+anchor.slice(5,7)-1)-11;
  var cutoff=Math.floor(ci/12)+'-'+String(ci%12+1).padStart(2,'0');
  var keys=Object.keys(mm).filter(function(k){return k>=cutoff;}).sort();
  return { labels:keys.map(function(k){var p=k.split('-');return "'"+p[0].slice(2)+'/'+p[1];}), values:keys.map(function(k){return mm[k];}) };
}

  chartInst=new Chart(cv,{
    data:{ labels:s.labels, datasets:[
      {type:'line', label:'総資産', data:s.values, borderColor:'#14654F', backgroundColor:'rgba(20,101,79,.08)', borderWidth:2, fill:true, tension:.18, pointRadius:3, pointBackgroundColor:'#14654F'},

var FORM=null;

function seedRows(date, editId){
  /* carry source = 直前のスナップショット（日付順） */
  var src = editId ? state.snapshots.find(function(x){return x.id===editId;}) : priorSnap(date,null);
  var carrySrc = priorSnap(date, editId); /* 繰越元（連動の基準） */
  var rows=[];
  var ids = src ? Object.keys(src.h) : (carrySrc?Object.keys(carrySrc.h):[]);
  state.securities.forEach(function(s){
    if(ids.indexOf(s.id)<0) return;
    var own = src? src.h[s.id] : null;
    var carry = carrySrc && carrySrc.h[s.id] && carrySrc.h[s.id].c!=null ? carrySrc.h[s.id].c : (s.種別==='投資'?0:null);
    rows.push({ secId:s.id, type:s.種別, carry:carry,
      cost: own && own.c!=null ? own.c : (s.種別==='投資'?(carry||0):null),
      add:  own ? (own.a||0) : 0,
      price: own ? own.p : (carrySrc&&carrySrc.h[s.id]?carrySrc.h[s.id].p:'') });
  });
  return rows;
}
function buildForm(editId){
  var today=new Date().toISOString().slice(0,10);

  renderForm();
}

  document.getElementById('modal').innerHTML=m;

function rowOf(id){ return FORM.rows.find(function(r){return r.secId===id;}); }
function onAdd(id,v){ var r=rowOf(id); r.add=parseFloat(v)||0; r.cost=(r.carry||0)+r.add; var ic=document.querySelector('#modal .ic[data-id="'+id+'"]'); if(ic) ic.querySelector('.f-cost').value=r.cost; recalc(); }
function onCost(id,v){ var r=rowOf(id); r.cost=parseFloat(v)||0; r.add=r.cost-(r.carry||0); var ic=document.querySelector('#modal .ic[data-id="'+id+'"]'); if(ic) ic.querySelector('.f-add').value=r.add; recalc(); }
function onPrice(id,v){ var r=rowOf(id); r.price=(v===''?'':(parseFloat(v)||0)); recalc(); }
function onDate(v){ FORM.date=v; if(!FORM.editId){ FORM.rows=seedRows(v,null); renderForm(); } }
function rmRow(id){ FORM.rows=FORM.rows.filter(function(r){return r.secId!==id;}); renderForm(); }
function addRow(){ var id=document.getElementById('addSel').value; if(!id)return; var s=secById(id);
  var carrySrc=priorSnap(FORM.date,FORM.editId); var carry=carrySrc&&carrySrc.h[id]&&carrySrc.h[id].c!=null?carrySrc.h[id].c:(s.種別==='投資'?0:null);
  FORM.rows.push({secId:id, type:s.種別, carry:carry, cost:s.種別==='投資'?(carry||0):null, add:0, price:''}); renderForm(); }
function recalc(){
  var total=0;
  FORM.rows.forEach(function(r){
    if(r.price!=='' && !isNaN(r.price)) total+=Number(r.price);
    if(r.type==='投資'){
      var ic=document.querySelector('#modal .ic[data-id="'+r.secId+'"]'); if(!ic)return;
      var out=ic.querySelector('.f-prof');
      if(r.price===''||isNaN(r.price)){ out.textContent='—'; out.className='f-prof num'; return; }
      var prof=Number(r.price)-(r.cost||0), pp=(r.cost>0)?prof/r.cost*100:0;
      out.textContent=signed(prof)+'  ('+pct(pp)+')'; out.className='f-prof num '+(prof>=0?'pos':'neg');
    }
  });
  var lt=document.getElementById('liveTotal'); if(lt) lt.textContent=yen(total);
}
function saveSnap(){
  if(!FORM.date){ alert('日付を入れてください'); return; }
  var h={};
  FORM.rows.forEach(function(r){
    if(r.price===''||isNaN(r.price)) return;
    if(r.type==='投資') h[r.secId]={c:(r.cost||0), a:(r.add||0), p:Number(r.price)};
    else h[r.secId]={c:null, a:0, p:Number(r.price)};
  });
  if(!Object.keys(h).length){ alert('現価額を1件以上入力してください'); return; }
  if(FORM.editId){ var sn=state.snapshots.find(function(x){return x.id===FORM.editId;}); sn.date=FORM.date; sn.memo=FORM.memo; sn.h=h; }
  else state.snapshots.push({id:'s'+Date.now().toString(36)+Math.random().toString(36).slice(2,5), date:FORM.date, memo:FORM.memo, h:h});
  closeModal(); persist(); CHARTMODE='month'; go('dash');
}

}
function saveSec(id){
  var name=document.getElementById('nsName').value.trim(); if(!name){alert('銘柄名を入れてください');return;}
  var o={種目:document.getElementById('nsSh').value, 銘柄:name, 正式名称:document.getElementById('nsFull').value.trim()||name, 種別:document.getElementById('nsType').value, メモ:document.getElementById('nsMemo').value.trim()};
  if(id){ Object.assign(secById(id),o); }
  else { o.id='sec'+Date.now().toString(36); state.securities.push(o); }
  closeModal(); persist(); go('sec');
}
function delSec(id){
  var used=state.snapshots.some(function(sn){return sn.h[id];});
  if(used){ alert('過去の確認で使われているため削除できません。'); return; }
  if(!confirm('この銘柄を削除しますか？'))return;
  state.securities=state.securities.filter(function(s){return s.id!==id;}); persist(); go('sec');
}

/* ===== data ops ===== */
function saveTarget(){ var v=parseFloat(document.getElementById('tgIn').value); if(!isNaN(v)){state.settings.target=v; persist(); alert('保存しました'); go('data');} }
function expJSON(){ var blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'}); var a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='asset-tracker-'+new Date().toISOString().slice(0,10)+'.json'; a.click(); }
function impJSON(e){ var f=e.target.files[0]; if(!f)return; var r=new FileReader();
  r.onload=function(){ try{ var d=JSON.parse(r.result); if(d.securities&&d.snapshots){ state=d; persist(); go('dash'); alert('読み込みました'); } else alert('形式が違います'); }catch(err){ alert('読み込み失敗：'+err.message); } };
  r.readAsText(f); }

/* ===== shell ===== */
function closeModal(e){ if(e&&e.target!==e.currentTarget)return; document.getElementById('modal').innerHTML=''; }
var TAB='dash';
function go(tab){ TAB=tab;
  document.querySelectorAll('#nav button').forEach(function(b){ b.classList.toggle('on', b.dataset.tab===tab); });
  var v=document.getElementById('view');
  if(tab==='dash'){ v.innerHTML=vDash(); setTimeout(drawChart,30); }
  else { document.getElementById('hdrupd').textContent=''; v.innerHTML = tab==='hist'?vHist() : tab==='sec'?vSec() : vData(); }
  window.scrollTo(0,0);
}
document.querySelectorAll('#nav button').forEach(function(b){ b.addEventListener('click',function(){go(b.dataset.tab);}); });
document.getElementById('fab').addEventListener('click',openNewSnap);

/* 起動：既存セッションがあれば自動で入る。無ければログイン画面のまま */
(function boot(){
  if(sb){
    sb.auth.getSession().then(function(r){
      if(r.data && r.data.session){ enterApp(r.data.session); }
    });
  } else {
    document.getElementById('authErr').textContent='ライブラリを読み込めませんでした（プレビューでは外部CDNがブロックされることがあります。本番URLでお試しください）。';
  }
})();
</script>
